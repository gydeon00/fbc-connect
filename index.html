  <style>
    :root{
      --bg: #f8f9fb;

      --border: rgba(0,0,0,0.05);

      --text: #1f2937;
      --muted: #6b7280;
      --footer-text: #6f7b93;

      --brand: #8B0000;
      --brand-dark: #6E0000;

      --shadow: 0 12px 30px rgba(0,0,0,0.08);
      --shadow-soft: 0 6px 18px rgba(0,0,0,0.06);
      --shadow-brand: 0 8px 18px rgba(139,0,0,0.18);

      --radius: 26px;
      --pill: 999px;
      --maxw: 390px;
    }

    * { box-sizing: border-box; }

    body{
      margin: 0;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      display: flex;
      justify-content: center;
      padding: 20px 12px;
      color: var(--text);
    }

    .wrap{
      width: 100%;
      max-width: var(--maxw);
    }

    .shell{
      background: var(--card);
      border-radius: 30px;
      padding: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .top{
      background: #fff;
      border-radius: 22px;
      padding: 18px;
      text-align: center;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border);
      margin-bottom: 14px;
    }

    .logo{
      width: 110px;
      height: 110px;
      margin: 4px auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo img{
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    h1{
      margin: 0;
      font-size: 19px;
      font-weight: 800;
    }

    .sub{
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.45;
    }

    .socials{
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 16px 0;
    }

    .icon{
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      border: 1px solid var(--border);
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      color: var(--brand);
      text-decoration: none;
      font-weight: 700;
      transition: all 0.15s ease;
    }

    .icon:hover{
      transform: translateY(-1px);
      box-shadow: 0 8px 14px rgba(0,0,0,0.08);
    }

    .icon svg{
      width: 18px;
      height: 18px;
      fill: var(--brand);
    }

    .main-btn{
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--pill);
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      box-shadow: var(--shadow-brand);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .main-btn:hover{
      transform: translateY(-1px);
      background: var(--brand-dark);
    }

    .hours{
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
    }

    .menu{
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 6px;
    }

    .menu-btn{
      text-decoration: none;
      text-align: center;
      padding: 14px;
      border-radius: var(--pill);
      color: #fff;
      font-weight: 700;
      background: var(--brand);
      box-shadow: var(--shadow-brand);
      cursor: pointer;
      transition: all 0.15s ease;
      display: block;
    }

    .menu-btn:hover{
      transform: translateY(-1px);
      background: var(--brand-dark);
    }

    .hidden{
      display: none;
    }

    .events-section{
      margin-top: 18px;
    }

    .events-title{
      font-size: 17px;
      font-weight: 800;
      text-align: center;
      margin: 0 0 12px;
    }

    .events-list{
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .event-card{
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      box-shadow: var(--shadow-soft);
    }

    .event-date{
      font-size: 12px;
      font-weight: 800;
      color: var(--brand);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .event-name{
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .event-meta{
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .event-empty,
    .event-error,
    .event-loading{
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      box-shadow: var(--shadow-soft);
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .full-calendar-link{
      display: block;
      margin-top: 12px;
      text-align: center;
      color: var(--brand);
      font-weight: 700;
      text-decoration: none;
    }

    .full-calendar-link:hover{

    }

    .footer{
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--footer-text);
      line-height: 1.45;
    }

    @media (max-width: 420px){
      .logo{
        width: 100px;
        height: 100px;
      }
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="shell">

    <div class="top">

      </div>

      <h1>FBC Wetumka</h1>
      <div class="sub">Weâ€™d love to connect with you. Tap below to get started.</div>

      <div class="socials">
        <a class="icon" href="https://www.facebook.com/fbcwetumka/" target="_blank" rel="noopener noreferrer" aria-label="Facebook">F</a>
        <a class="icon" href="https://www.youtube.com/@fbcwetumka8916" target="_blank" rel="noopener noreferrer" aria-label="YouTube">â–¶</a>
        <a class="icon" href="mailto:fbcwetumka@gmail.com" aria-label="Email">âś‰</a>
      </div>

      <button class="main-btn" onclick="window.location.href='mailto:fbcwetumka@gmail.com'">
        Send us a message
      </button>

      <div class="hours">Available daily: 8AM â€“ 5PM</div>

    <div class="menu">
      <a class="menu-btn" href="sms:+14054511242?body=connect">Iâ€™m New</a>
      <a class="menu-btn" href="https://wetumkafbc.churchcenter.com/giving">Give</a>
      <a class="menu-btn" href="#" id="events-toggle">Events</a>

    <section id="events-section" class="events-section hidden">
      <h2 class="events-title">Upcoming Events</h2>

      <div id="events-list" class="events-list">
        <div class="event-loading">Loading events...</div>
      </div>

      <a
        class="full-calendar-link"
        href="https://calendar.google.com/calendar/u/0/r?cid=9uj8atk5orpfqpdpr2sb8p36ik%40group.calendar.google.com&mode=MONTH"
        target="_blank"
        rel="noopener noreferrer"
      >
        View Full Calendar
      </a>

    <div class="footer">

    </div>

  </div>
</div>

<script>
  const calendarId = "9uj8atk5orpfqpdpr2sb8p36ik@group.calendar.google.com";
  const apiKey = "AIzaSyAWewcBgbsJ1nSjigsPGmklup17OLPAvWk";

  let eventsLoaded = false;
  const toggleBtn = document.getElementById("events-toggle");

  async function loadEvents() {
    const list = document.getElementById("events-list");
    const now = new Date().toISOString();

    const url =
      `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events` +
      `?key=${apiKey}` +
      `&singleEvents=true` +
      `&orderBy=startTime` +
      `&timeMin=${encodeURIComponent(now)}` +
      `&maxResults=3`;

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error("Failed to load events");

      const data = await res.json();
      const events = data.items || [];

      if (!events.length) {
        list.innerHTML = `<div class="event-empty">No upcoming events.</div>`;
        return;
      }

      list.innerHTML = events.map(event => {
        const start = new Date(event.start.dateTime || event.start.date);

        const dateText = start.toLocaleDateString([], {
          weekday: "short",
          month: "short",
          day: "numeric"
        });

        const timeText = event.start.dateTime
          ? start.toLocaleTimeString([], {
              hour: "numeric",
              minute: "2-digit"
            })
          : "All Day";

        return `
          <div class="event-card">
            <div class="event-date">${dateText}</div>
            <div class="event-name">${event.summary || "Untitled Event"}</div>
            <div class="event-meta">${timeText}</div>
          </div>
        `;
      }).join("");
    } catch (error) {
      list.innerHTML = `<div class="event-error">Unable to load events.</div>`;
    }
  }

  toggleBtn.addEventListener("click", async function(e) {
    e.preventDefault();

    const section = document.getElementById("events-section");

    if (section.classList.contains("hidden")) {
      section.classList.remove("hidden");
      toggleBtn.textContent = "Hide Events";

      if (!eventsLoaded) {
        await loadEvents();
        eventsLoaded = true;
      }

      section.scrollIntoView({ behavior: "smooth", block: "start" });
    } else {
      section.classList.add("hidden");
      toggleBtn.textContent = "Events";
    }
  });
</script>
</body>
